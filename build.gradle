plugins {
    id 'java'
    id 'application' //added to have specific run task
}

group = 'com.mintos'
version = '1.0-SNAPSHOT'

//added to have specific run task
application{
    mainClass.set('test.java.runners.TestRunner')
}

repositories {
    mavenCentral()
}


dependencies {
    testImplementation platform('org.junit:junit-bom:5.9.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'io.cucumber:cucumber-java:7.18.0'
    testImplementation 'io.cucumber:cucumber-junit:7.18.0'
    testImplementation 'com.microsoft.playwright:playwright:1.45.0'
    testImplementation 'io.rest-assured:rest-assured:5.4.0'
    testImplementation 'org.postgresql:postgresql:42.7.3'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'io.cucumber:cucumber-picocontainer:7.18.0'
    implementation 'com.google.code.gson:gson:2.10.1'
    testImplementation 'com.google.code.gson:gson:2.10.1'

}

test {
    useJUnit()
    testLogging {
        // Show that tests are run in the console
        events "passed", "skipped", "failed", "standardOut", "standardError"
        showStandardStreams = true
        exceptionFormat = "full"
    }
}